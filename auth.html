<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedank Music — Login / Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--red:#FF2020;--dark:#060608;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 0;}

/* ─── Ambient bg ─── */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(255,30,30,0.08) 0%,transparent 70%),radial-gradient(ellipse 60% 60% at 80% 80%,rgba(255,215,0,0.06) 0%,transparent 70%);animation:auroraMove 10s ease-in-out infinite alternate;}
@keyframes auroraMove{0%{opacity:.7;transform:scale(1);}100%{opacity:1;transform:scale(1.04);}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,215,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.025) 1px,transparent 1px);background-size:60px 60px;}
canvas#bgc{position:fixed;inset:0;z-index:0;pointer-events:none;}
.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:1;animation:ptDrift linear infinite;}
@keyframes ptDrift{0%{transform:translateY(100vh);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-80px);opacity:0;}}

/* ─── Card ─── */
.card{position:relative;z-index:10;background:rgba(10,10,14,0.88);border:1px solid rgba(255,215,0,0.18);border-radius:28px;padding:40px 36px 36px;width:100%;max-width:430px;margin:auto 20px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(255,215,0,0.06),0 0 0 1px rgba(255,255,255,0.04);}
.card::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--red),var(--gold),transparent);animation:topLine 3s linear infinite;background-size:200% 100%;}
@keyframes topLine{0%{background-position:0% center;}100%{background-position:200% center;}}

/* ─── Logo ─── */
.logo-area{text-align:center;margin-bottom:28px;}
.logo-title{font-family:'Cinzel Decorative',serif;font-size:26px;font-weight:900;margin-bottom:4px;}
.logo-title .g{color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.5);}
.logo-title .r{color:var(--red);text-shadow:0 0 20px rgba(255,32,32,0.5);}
.logo-sub{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.3);}

/* ─── Tabs ─── */
.tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:14px;padding:4px;margin-bottom:28px;gap:4px;}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .3s;border:none;background:none;}
.tab.active{background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,32,32,0.1));color:var(--gold);box-shadow:0 0 15px rgba(255,215,0,0.1);}

/* ─── Forms ─── */
.form{display:none;animation:fadeUp .4s ease;}
.form.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.field{margin-bottom:18px;position:relative;}
.field label{display:block;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,215,0,0.6);margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.15);border-radius:12px;padding:14px 16px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;outline:none;transition:all .3s;}
.field input:focus{border-color:rgba(255,215,0,0.5);background:rgba(255,215,0,0.05);box-shadow:0 0 20px rgba(255,215,0,0.08);}
.field input::placeholder{color:rgba(255,255,255,0.2);font-weight:400;}

.forgot-link{text-align:right;margin-top:-10px;margin-bottom:18px;}
.forgot-link a{font-size:13px;color:rgba(255,215,0,0.5);text-decoration:none;cursor:pointer;transition:color .2s;}
.forgot-link a:hover{color:var(--gold);}

/* ─── Buttons ─── */
.btn{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#c9a000,#FF2020);color:#fff;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;margin-top:4px;}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);opacity:0;transition:opacity .3s;}
.btn:hover::before{opacity:1;}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,215,0,0.25);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.btn-google{width:100%;padding:13px;border:1px solid rgba(255,255,255,0.12);border-radius:14px;background:rgba(255,255,255,0.05);color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s;margin-top:12px;letter-spacing:1px;}
.btn-google:hover:not(:disabled){background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);transform:translateY(-2px);}
.btn-google:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.g-icon{width:20px;height:20px;flex-shrink:0;}

.divider-or{display:flex;align-items:center;gap:12px;margin:18px 0 4px;color:rgba(255,255,255,0.2);font-size:12px;letter-spacing:2px;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}

/* ─── Messages ─── */
.msg{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:16px;display:none;text-align:center;animation:fadeUp .3s ease;}
.msg.error{background:rgba(255,32,32,0.12);border:1px solid rgba(255,32,32,0.3);color:#ff6b6b;display:block;}
.msg.success{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);color:var(--gold);display:block;}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

#forgot-info{font-size:14px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:20px;line-height:1.6;}
</style>
</head>
<body>

<div class="aurora"></div>
<div class="grid-overlay"></div>
<canvas id="bgc"></canvas>

<div class="card">
  <div class="logo-area">
    <div class="logo-title"><span class="g">VEDANK</span> <span class="r">MUSIC</span></div>
    <div class="logo-sub">OFFICIAL PORTAL</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" id="tab-login">LOGIN</button>
    <button class="tab" id="tab-signup">SIGN UP</button>
  </div>

  <div class="msg" id="msg"></div>

  <!-- ─── LOGIN ─── -->
  <div class="form active" id="form-login">
    <div class="field">
      <label>EMAIL ADDRESS</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="forgot-link"><a id="link-forgot">Forgot password?</a></div>
    <button class="btn" id="btn-login">LOGIN</button>
    <div class="divider-or">OR</div>
    <button class="btn-google" id="btn-google-login">
      <svg class="g-icon" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.977 32.411 29.464 35 24 35c-6.065 0-11-4.935-11-11s4.935-11 11-11c2.804 0 5.354 1.063 7.281 2.793l5.658-5.657C33.276 7.243 28.842 5 24 5 13.507 5 5 13.507 5 24s8.507 19 19 19c10.998 0 19-7.999 19-19 0-1.295-.138-2.558-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c2.804 0 5.354 1.063 7.281 2.793l5.658-5.657C33.276 7.243 28.842 5 24 5 16.318 5 9.656 9.341 6.306 14.691z"/><path fill="#4CAF50" d="M24 43c4.728 0 9.06-1.694 12.35-4.48l-6.19-5.238C28.348 34.524 26.26 35 24 35c-5.445 0-9.942-3.565-11.28-8.434l-6.519 5.025C9.505 39.556 16.227 43 24 43z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.867 2.476-2.504 4.549-4.616 5.974l6.19 5.238C42.012 36.021 45 30.555 45 24c0-1.295-.138-2.558-.389-3.917z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- ─── SIGN UP ─── -->
  <div class="form" id="form-signup">
    <div class="field">
      <label>FULL NAME</label>
      <input type="text" id="signup-name" placeholder="Your Name" autocomplete="name">
    </div>
    <div class="field">
      <label>EMAIL ADDRESS</label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="signup-pass" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <button class="btn" id="btn-signup">CREATE ACCOUNT</button>
    <div class="divider-or">OR</div>
    <button class="btn-google" id="btn-google-signup">
      <svg class="g-icon" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.977 32.411 29.464 35 24 35c-6.065 0-11-4.935-11-11s4.935-11 11-11c2.804 0 5.354 1.063 7.281 2.793l5.658-5.657C33.276 7.243 28.842 5 24 5 13.507 5 5 13.507 5 24s8.507 19 19 19c10.998 0 19-7.999 19-19 0-1.295-.138-2.558-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c2.804 0 5.354 1.063 7.281 2.793l5.658-5.657C33.276 7.243 28.842 5 24 5 16.318 5 9.656 9.341 6.306 14.691z"/><path fill="#4CAF50" d="M24 43c4.728 0 9.06-1.694 12.35-4.48l-6.19-5.238C28.348 34.524 26.26 35 24 35c-5.445 0-9.942-3.565-11.28-8.434l-6.519 5.025C9.505 39.556 16.227 43 24 43z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.867 2.476-2.504 4.549-4.616 5.974l6.19 5.238C42.012 36.021 45 30.555 45 24c0-1.295-.138-2.558-.389-3.917z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- ─── FORGOT ─── -->
  <div class="form" id="form-forgot">
    <p id="forgot-info">Enter your email and we'll send you a password reset link.</p>
    <div class="field">
      <label>EMAIL ADDRESS</label>
      <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn" id="btn-forgot">SEND RESET LINK</button>
    <div style="text-align:center;margin-top:16px;">
      <a id="link-back-login" style="font-size:13px;color:rgba(255,215,0,0.5);cursor:pointer;font-family:'Rajdhani',sans-serif;transition:color .2s;">← Back to Login</a>
    </div>
  </div>

</div><!-- /card -->

<!-- ════════════════════════════════════════════════════════
     FIREBASE MODULE — single script, zero duplicates
════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── Init ── */
const firebaseConfig = {
  apiKey:            "AIzaSyDA1t6C0WZOwtjlC_-w0PFuwr0b-mAJEtQ",
  authDomain:        "vedankmusic.firebaseapp.com",
  projectId:         "vedankmusic",
  storageBucket:     "vedankmusic.firebasestorage.app",
  messagingSenderId: "906382095261",
  appId:             "1:906382095261:web:47950aa259df0687f73574",
  measurementId:     "G-XBT50SJGPY"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

const ADMIN_EMAIL = "vedankmusic@proton.me";

/* Prevents the auto-redirect listener below from firing (and navigating
   away) before an in-progress signup/login flow has finished writing the
   user's Firestore document — this was the cause of new users existing in
   Firebase Auth but never getting a "users/{uid}" document. */
let authFlowInProgress = false;

/* ── Auto-redirect if already logged in (e.g. returning with an active session) ── */
onAuthStateChanged(auth, async (user) => {
  if (user && !authFlowInProgress) {
    await ensureUserDocument(user);
    redirectUser(user);
  }
});

/* ════════════════════════════════════════
   CORE FUNCTIONS
════════════════════════════════════════ */

/** Create Firestore doc only if it doesn't exist yet */
async function ensureUserDocument(user, fallbackName) {
  const ref  = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      name:               fallbackName || user.displayName || "Artist",
      email:              user.email || "",
      accountType:        user.email === ADMIN_EMAIL ? "admin" : "user",
      description:        "",
      distributionStatus: "Pending",
      oacStatus:          "Pending",
      liveDate:           "",
      createdAt:          serverTimestamp()
    });
  }
}

/** Read accountType and redirect accordingly */
async function redirectUser(user) {
  try {
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists() && snap.data().accountType === "admin") {
      window.location.href = "Admin.html";
    } else {
      window.location.href = "Dashboard.html";
    }
  } catch (_) {
    window.location.href = "Dashboard.html";
  }
}

/* ════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════ */

function showMsg(text, type) {
  const m = document.getElementById("msg");
  m.textContent = text;
  m.className = "msg " + type;
}
function hideMsg() {
  document.getElementById("msg").className = "msg";
}

function setLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>PLEASE WAIT...'
    : label;
}

function disableGoogleBtn(id, disabled) {
  document.getElementById(id).disabled = disabled;
}

/* ════════════════════════════════════════
   ERROR MAP
════════════════════════════════════════ */
function friendlyError(code) {
  const map = {
    "auth/user-not-found":          "No account found with this email.",
    "auth/wrong-password":          "Incorrect password. Try again.",
    "auth/invalid-credential":      "Email or password is incorrect.",
    "auth/email-already-in-use":    "This email is already registered. Try logging in.",
    "auth/invalid-email":           "Invalid email address.",
    "auth/weak-password":           "Password must be at least 6 characters.",
    "auth/too-many-requests":       "Too many attempts. Please wait and try again.",
    "auth/network-request-failed":  "Network error. Check your connection.",
    "auth/popup-closed-by-user":    "Sign-in popup closed. Please try again.",
    "auth/cancelled-popup-request": "Another popup is already open."
  };
  return map[code] || "Something went wrong. Please try again.";
}

/* ════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll(".form").forEach(f => f.classList.remove("active"));
  document.getElementById("form-" + tab).classList.add("active");
  // Manage tab bar visibility
  const tabsEl = document.getElementById("tabs");
  if (tab === "forgot") {
    tabsEl.style.display = "none";
    document.getElementById("tab-login").classList.remove("active");
    document.getElementById("tab-signup").classList.remove("active");
  } else {
    tabsEl.style.display = "flex";
    document.getElementById("tab-login").classList.toggle("active",  tab === "login");
    document.getElementById("tab-signup").classList.toggle("active", tab === "signup");
  }
  hideMsg();
}

document.getElementById("tab-login").addEventListener("click",  () => switchTab("login"));
document.getElementById("tab-signup").addEventListener("click", () => switchTab("signup"));
document.getElementById("link-forgot").addEventListener("click", () => switchTab("forgot"));
document.getElementById("link-back-login").addEventListener("click", () => switchTab("login"));

/* ════════════════════════════════════════
   LOGIN
════════════════════════════════════════ */
document.getElementById("btn-login").addEventListener("click", async () => {
  hideMsg();
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-pass").value;
  if (!email || !pass) { showMsg("Please fill in all fields.", "error"); return; }

  setLoading("btn-login", true, "LOGIN");
  authFlowInProgress = true;
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    showMsg("✅ Login successful! Redirecting...", "success");
    await redirectUser(cred.user);
  } catch (e) {
    showMsg(friendlyError(e.code), "error");
    setLoading("btn-login", false, "LOGIN");
  }
});

/* ════════════════════════════════════════
   SIGN UP
════════════════════════════════════════ */
document.getElementById("btn-signup").addEventListener("click", async () => {
  hideMsg();
  const name  = document.getElementById("signup-name").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const pass  = document.getElementById("signup-pass").value;
  if (!name || !email || !pass) { showMsg("Please fill in all fields.", "error"); return; }
  if (pass.length < 6) { showMsg("Password must be at least 6 characters.", "error"); return; }

  setLoading("btn-signup", true, "CREATE ACCOUNT");
  authFlowInProgress = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await ensureUserDocument(cred.user, name);
    showMsg("🎉 Account created! Welcome to Vedank Music!", "success");
    await redirectUser(cred.user);
  } catch (e) {
    showMsg(friendlyError(e.code), "error");
    setLoading("btn-signup", false, "CREATE ACCOUNT");
  }
});

/* ════════════════════════════════════════
   GOOGLE SIGN IN  (shared handler)
════════════════════════════════════════ */
async function doGoogle(loginBtnId, signupBtnId) {
  hideMsg();
  disableGoogleBtn(loginBtnId,  true);
  disableGoogleBtn(signupBtnId, true);
  authFlowInProgress = true;
  try {
    const result = await signInWithPopup(auth, provider);
    await ensureUserDocument(result.user, result.user.displayName || "Artist");
    showMsg("✅ Signed in! Redirecting...", "success");
    await redirectUser(result.user);
  } catch (e) {
    const silent = ["auth/popup-closed-by-user", "auth/cancelled-popup-request"];
    if (!silent.includes(e.code)) showMsg(friendlyError(e.code), "error");
    disableGoogleBtn(loginBtnId,  false);
    disableGoogleBtn(signupBtnId, false);
  }
}

document.getElementById("btn-google-login").addEventListener("click",
  () => doGoogle("btn-google-login", "btn-google-signup"));
document.getElementById("btn-google-signup").addEventListener("click",
  () => doGoogle("btn-google-login", "btn-google-signup"));

/* ════════════════════════════════════════
   FORGOT PASSWORD
════════════════════════════════════════ */
document.getElementById("btn-forgot").addEventListener("click", async () => {
  hideMsg();
  const email = document.getElementById("forgot-email").value.trim();
  if (!email) { showMsg("Please enter your email address.", "error"); return; }

  setLoading("btn-forgot", true, "SEND RESET LINK");
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg("📧 Reset link sent! Check your email inbox.", "success");
  } catch (e) {
    showMsg(friendlyError(e.code), "error");
  } finally {
    setLoading("btn-forgot", false, "SEND RESET LINK");
  }
});

/* ════════════════════════════════════════
   ENTER KEY
════════════════════════════════════════ */
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const active = document.querySelector(".form.active")?.id;
  if (active === "form-login")  document.getElementById("btn-login").click();
  if (active === "form-signup") document.getElementById("btn-signup").click();
  if (active === "form-forgot") document.getElementById("btn-forgot").click();
});
</script>

<!-- ════════════════════════════════════════════════════════
     UI SCRIPT — tab init + particles + canvas (no Firebase)
════════════════════════════════════════════════════════ -->
<script>
/* ─── Floating particles ─── */
const colors = ['#FFD700','#FF2020','#FFA500'];
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'pt';
  const s = 2 + Math.random() * 4;
  const c = colors[Math.floor(Math.random() * 3)];
  p.style.cssText = `width:${s}px;height:${s}px;background:${c};left:${Math.random()*100}vw;` +
    `animation-duration:${12+Math.random()*18}s;animation-delay:-${Math.random()*20}s;` +
    `opacity:${0.3+Math.random()*0.4};box-shadow:0 0 ${s*2}px ${c};`;
  document.body.appendChild(p);
}

/* ─── Canvas dot network ─── */
const canvas = document.getElementById('bgc');
const ctx    = canvas.getContext('2d');
let W, H, dots = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class D {
  constructor() { this.r(); }
  r() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - .5) * .35;
    this.vy = (Math.random() - .5) * .35;
    this.rad = 1 + Math.random() * 1.8;
    this.c  = Math.random() > .5 ? 'rgba(255,215,0,' : 'rgba(255,32,32,';
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.rad, 0, Math.PI * 2);
    ctx.fillStyle = this.c + '0.55)';
    ctx.fill();
  }
}

for (let i = 0; i < 40; i++) dots.push(new D());

(function loop() {
  ctx.clearRect(0, 0, W, H);
  dots.forEach(d => { d.update(); d.draw(); });
  for (let i = 0; i < dots.length; i++) {
    for (let j = i + 1; j < dots.length; j++) {
      const dx   = dots[i].x - dots[j].x;
      const dy   = dots[i].y - dots[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 130) {
        ctx.beginPath();
        ctx.moveTo(dots[i].x, dots[i].y);
        ctx.lineTo(dots[j].x, dots[j].y);
        ctx.strokeStyle = `rgba(255,215,0,${(1-dist/130)*.1})`;
        ctx.lineWidth   = .7;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
